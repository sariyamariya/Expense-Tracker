<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <Link rel="stylesheet"  href="m.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">

    <h1>Expense Tracker</h1>

    <div class="top-section">

      <!-- FORM -->
      <div class="card">
        <h2>Add Expense</h2>

        <form id="expenseForm">

          <input type="text" id="title" placeholder="Expense Title" required>

          <input type="number" id="amount" placeholder="Amount" required>

          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
          </select>

          <input type="date" id="date" required>

          <button type="submit">Add Expense</button>

        </form>
      </div>

      <!-- CHART -->
      <div class="card">
        <h2>Expense Chart</h2>
        <canvas id="expenseChart"></canvas>
      </div>

    </div>

    <!-- TOTAL -->
    <div class="total-box">
      Total Expense: ₹ <span id="totalExpense">0</span>
    </div>

    <!-- TABLE -->
    <div class="expense-list">
      <table>

        <thead>
          <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="expenseTableBody">

        </tbody>

      </table>
    </div>

  </div>

  <script>

    const expenseForm = document.getElementById("expenseForm");
    const expenseTableBody = document.getElementById("expenseTableBody");
    const totalExpense = document.getElementById("totalExpense");

    let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

    // Chart
    const ctx = document.getElementById('expenseChart');

    let expenseChart = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Food', 'Travel', 'Shopping'],
        datasets: [{
          label: 'Expenses',
          data: [0,0,0],
          borderWidth: 1
        }]
      }
    });

    // Add Expense
    expenseForm.addEventListener("submit", function(e){
      e.preventDefault();

      const title = document.getElementById("title").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const category = document.getElementById("category").value;
      const date = document.getElementById("date").value;

      const expense = {
        id: Date.now(),
        title,
        amount,
        category,
        date
      };

      expenses.push(expense);

      localStorage.setItem("expenses", JSON.stringify(expenses));

      displayExpenses();

      expenseForm.reset();
    });

    // Display Expenses
    function displayExpenses(){

      expenseTableBody.innerHTML = "";

      let total = 0;

      let food = 0;
      let travel = 0;
      let shopping = 0;

      expenses.forEach(expense => {

        total += expense.amount;

        if(expense.category === "Food"){
          food += expense.amount;
        }
        else if(expense.category === "Travel"){
          travel += expense.amount;
        }
        else if(expense.category === "Shopping"){
          shopping += expense.amount;
        }

        const row = `
          <tr>
            <td>${expense.title}</td>
            <td>₹ ${expense.amount}</td>
            <td>${expense.category}</td>
            <td>${expense.date}</td>
            <td>
              <button class="delete-btn" onclick="deleteExpense(${expense.id})">
                Delete
              </button>
            </td>
          </tr>
        `;

        expenseTableBody.innerHTML += row;

      });

      totalExpense.innerText = total;

      // Update Chart
      expenseChart.data.datasets[0].data = [food, travel, shopping];
      expenseChart.update();

    }

    // Delete Expense
    function deleteExpense(id){

      expenses = expenses.filter(expense => expense.id !== id);

      localStorage.setItem("expenses", JSON.stringify(expenses));

      displayExpenses();
    }

    displayExpenses();
  </script>

</body>
</html>
